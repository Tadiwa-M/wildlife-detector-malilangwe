# Unified class schema for Phase A+ multi-dataset training.
# Maps each source dataset's class IDs to the unified Prometheus class IDs.
#
# Unified classes (8 total):
#   0: elephant
#   1: zebra
#   2: buffalo
#   3: antelope  (kob, topi, waterbuck, impala, eland, springbok, etc.)
#   4: cattle
#   5: giraffe
#   6: lion
#   7: other     (sheep, seal, camelus, kiang, warthog, ostrich, etc.)
#
# rhino is excluded from v1 — no confirmed downloadable dataset.
# Re-add if WildlifeMapper classes.txt confirms a rhino class.

unified_classes:
  - elephant
  - zebra
  - buffalo
  - antelope
  - cattle
  - giraffe
  - lion
  - other

dataset_mappings:
  # WAID (Wildlife Aerial Images from Drone)
  # Original: sheep(0), cattle(1), seal(2), camelus(3), kiang(4), zebra(5)
  # Source: https://github.com/xiaohuicui/WAID
  waid:
    0: null  # sheep    → drop (not African / not Malilangwe-relevant)
    1: 4     # cattle   → cattle
    2: null  # seal     → drop (not African inland)
    3: null  # camelus  → drop (not sub-Saharan Africa)
    4: null  # kiang    → drop (Tibetan wild ass, not African)
    5: 1     # zebra    → zebra

  # AED (Aerial Elephant Dataset)
  # Original: elephant(0)
  # Source: https://zenodo.org/record/3234780
  aed:
    0: 0   # elephant → elephant

  # Liege University African Mammals Dataset
  # Original: zebra(0), elephant(1), buffalo(2), kob(3), topi(4), warthog(5), waterbuck(6)
  # Source: https://dataverse.uliege.be/file.xhtml?fileId=11098
  liege:
    0: 1   # zebra     → zebra
    1: 0   # elephant  → elephant
    2: 2   # buffalo   → buffalo
    3: 3   # kob       → antelope
    4: 3   # topi      → antelope
    5: 7   # warthog   → other
    6: 3   # waterbuck → antelope

  # WildlifeMapper (CVPR 2024)
  # 20 species from aerial surveys — includes lion, elephant, giraffe, zebra
  # Source: https://data.4tu.nl/articles/dataset/12713903/1
  # IMPORTANT: 20-class dataset — verify classes.txt and update all IDs.
  # Unmapped classes will be skipped with a warning.
  wildlifemapper:
    0: 0   # elephant      → elephant  (verify ID)
    1: 1   # zebra         → zebra     (verify ID)
    2: 5   # giraffe       → giraffe   (verify ID)
    3: 6   # lion          → lion      (verify ID)
    4: 2   # buffalo       → buffalo   (verify ID)
    5: 3   # antelope/impala → antelope (verify ID)
    # Remaining 14 classes: map to 7 (other) or a named class once classes.txt confirmed
    # If rhino appears, add it back to unified_classes and re-number other → 8

  # MMLA (Multi-Modal Large Animal Dataset, 2025)
  # 811K annotations, 37 videos from Ol Pejeta, Mpala, The Wilds
  # 6 species: zebra, giraffe, wild dog + others TBC from classes.txt
  # Source: https://arxiv.org/pdf/2504.07744
  # Classes TBC — fill in after downloading and checking classes.txt
  mmla: {}

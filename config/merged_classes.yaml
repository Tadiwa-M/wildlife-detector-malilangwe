# Unified class schema for Phase A+ multi-dataset training.
# Maps each source dataset's class IDs to the unified Prometheus class IDs.
#
# Unified classes (7 total) — v1: WAID + Liege + Savanna:
#   0: elephant
#   1: zebra
#   2: buffalo
#   3: antelope  (kob, topi, waterbuck, Alcelaphinae, impala, etc.)
#   4: cattle
#   5: giraffe   (from Savanna dataset)
#   6: other     (warthog, ostrich, etc.)

unified_classes:
  - elephant  # 0
  - zebra     # 1
  - buffalo   # 2
  - antelope  # 3
  - cattle    # 4
  - giraffe   # 5
  - other     # 6

dataset_mappings:
  # WAID (Wildlife Aerial Images from Drone)
  # Original: sheep(0), cattle(1), seal(2), camelus(3), kiang(4), zebra(5)
  # Source: https://github.com/xiaohuicui/WAID
  waid:
    0: null  # sheep    → drop (not African / not Malilangwe-relevant)
    1: 4     # cattle   → cattle
    2: null  # seal     → drop (not African inland)
    3: null  # camelus  → drop (not sub-Saharan Africa)
    4: null  # kiang    → drop (Tibetan wild ass, not African)
    5: 1     # zebra    → zebra

  # AED (Aerial Elephant Dataset) — skipped for v1 (point annotations, no bounding boxes)
  # Source: https://zenodo.org/record/3234780
  aed:
    0: 0   # elephant → elephant

  # Liege University African Mammals Dataset
  # Actual COCO category IDs from general_dataset JSON:
  #   1: Alcelaphinae, 2: Buffalo, 3: Kob, 4: Warthog, 5: Waterbuck, 6: Elephant
  # Converter (Colab cell) outputs YOLO with unified IDs → identity mapping here.
  # Source: https://dataverse.uliege.be/file.xhtml?fileId=11098
  liege:
    0: 0   # elephant  → elephant
    2: 2   # buffalo   → buffalo
    3: 3   # antelope  → antelope
    6: 6   # other     → other

  # Savanna Wildlife Dataset (Naude & Joubert 2019)
  # Species: Elephant, Zebra, Giraffe — pre-split train/val/test CSV annotations
  # Converter (Colab cell) outputs YOLO with unified IDs → identity mapping here.
  # Source: https://data.4tu.nl/datasets/9b1a2fcb-930e-4cc5-b9f0-a381dd1c7206/1
  savanna:
    0: 0   # elephant → elephant
    1: 1   # zebra    → zebra
    5: 5   # giraffe  → giraffe

  # WildlifeMapper — access required, not yet downloadable
  # GitHub: https://github.com/UCSB-VRL/WildlifeMapper
  wildlifemapper:
    0: 0   # elephant        → elephant
    1: 1   # zebra           → zebra
    2: 5   # giraffe         → giraffe
    3: 6   # lion            → other (no lion class in v1)
    4: 2   # buffalo         → buffalo
    5: 3   # antelope/impala → antelope

  # MMLA — not yet publicly available
  mmla: {}
